<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Searchbox: budget-bounded closed-dataroom QA</title>
<meta name="description" content="Give a prompt, a zip, and an input-token budget. A self-hosted model in a Pi harness explores the dataroom with local jina retrieval until the budget is spent, then answers fully cited." />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta name="theme-color" content="#000000" />
<style>
  :root{--bg:#fff;--fg:#000;--mut:#666;--line:#000;--soft:#e5e5e5;--fill:#f5f5f5}
  @media (prefers-color-scheme: dark){:root{--bg:#000;--fg:#fff;--mut:#999;--line:#fff;--soft:#222;--fill:#111}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);overflow-x:hidden;
    font-family:"Berkeley Mono",ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;padding:48px 24px}
  .masthead{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px}
  h1{font-size:15px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin:0}
  p{color:var(--mut)}
  .lede{color:var(--fg);margin-top:20px}
  textarea{width:100%;min-height:80px;margin-top:8px;background:var(--bg);color:var(--fg);border:1px solid var(--line);padding:10px;font:inherit;resize:vertical}
  .btn{border:1px solid var(--line);background:var(--fg);color:var(--bg);padding:8px 16px;cursor:pointer;font:inherit}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .field{margin-top:18px}
  .lbl{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
  .fieldrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:18px}
  .fieldrow .btn{margin-left:auto}
  input[type=number]{width:120px;background:var(--bg);color:var(--fg);border:1px solid var(--line);padding:7px 8px;font:inherit}
  /* Custom file picker: native input hidden, label styled like a secondary button to match
     the rest of the monospace/boxed UI. */
  input[type=file]{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;clip:rect(0 0 0 0)}
  .filebtn{display:inline-flex;align-items:center;gap:8px}
  .filebtn .pick{border:1px solid var(--line);background:var(--bg);color:var(--fg);padding:7px 14px;cursor:pointer;font:inherit;white-space:nowrap}
  .filebtn .pick:hover{background:var(--soft)}
  .filebtn .fname{color:var(--mut);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:340px}
  .jobs{margin-top:36px;border-top:1px solid var(--line);padding-top:16px}
  .job{display:flex;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--soft);cursor:pointer}
  .job:hover{background:var(--fill)}
  .job .st{flex:none;width:14px}
  .job .q{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .job .pg{color:var(--mut);flex:none;width:140px;text-align:right;font-size:12px}
  .job .acts{flex:none;display:flex;gap:5px}
  .dot{display:inline-block;width:7px;height:7px;border:1px solid var(--line)}
  .dot.on{background:var(--fg)}
  .blink{animation:b 1s steps(2) infinite}@keyframes b{50%{opacity:.2}}
  .icon{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--bg);color:var(--fg);text-decoration:none}
  .icon:hover{background:var(--soft)}
  .icon[aria-disabled=true]{opacity:.3;pointer-events:none}
  .msg{margin-top:12px;color:var(--mut);font-size:12px}
  .toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut)}
  .toggle input{width:14px;height:14px;accent-color:var(--fg);cursor:pointer}
  .tools{display:flex;flex-wrap:wrap;gap:16px}
  .tools .toggle{text-transform:none;letter-spacing:0;font-size:12px;color:var(--fg)}
  #budgetwrap.off{opacity:.35;pointer-events:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead"><h1>Searchbox</h1><a class="icon" href="https://github.com/hanxiao/searchbox" target="_blank" rel="noopener" title="Source on GitHub"><svg viewBox="0 0 16 16" width="15" height="15" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a></div>

  <form id="f">
    <div class="field">
      <label class="lbl" for="prompt">Prompt</label>
      <textarea id="prompt" placeholder="What question should be answered from the dataroom?"></textarea>
    </div>
    <div class="field">
      <label class="lbl" for="dataroom">Dataroom (.zip, optional)</label>
      <div class="filebtn">
        <label class="pick" for="dataroom">Choose file</label>
        <input type="file" id="dataroom" accept=".zip" />
        <span class="fname" id="fname"></span>
      </div>
    </div>
    <div class="field">
      <label class="lbl">External tools <span id="toolcount" style="text-transform:none;letter-spacing:0;color:var(--mut)"></span></label>
      <div class="tools" id="tools"></div>
    </div>
    <div class="fieldrow">
      <label class="toggle">
        <input type="checkbox" id="force" checked />
        <span>Force budget</span>
      </label>
      <div id="budgetwrap">
        <input type="number" id="budget" value="100000" min="10000" step="10000" />
      </div>
      <button class="btn" type="submit" id="go">Run</button>
    </div>
  </form>
  <div class="msg" id="msg"></div>

  <div class="jobs">
    <div class="lbl">Recent jobs</div>
    <div id="jobs"><div class="msg">none yet</div></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const escn=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
// Load the external-tool catalog and render the toggle list.
(async()=>{
  try{
    const r=await fetch("/tools",{cache:"no-store"});const d=await r.json();
    const tools=d.tools||[];
    $("tools").innerHTML=tools.map(t=>
      `<label class="toggle" title="${escn(t.desc)}"><input type="checkbox" class="tool" value="${escn(t.name)}"${t.default?" checked":""} /><span>${escn(t.name)}</span></label>`
    ).join("");
    $("toolcount").textContent=`(${tools.length} available, all embedding/rerank based)`;
  }catch(e){$("tools").innerHTML='<span class="msg">could not load tools</span>';}
})();
$("dataroom").addEventListener("change",()=>{
  const f=$("dataroom").files[0];
  $("fname").textContent=f?f.name:"";
});
$("force").addEventListener("change",()=>{
  $("budgetwrap").classList.toggle("off",!$("force").checked);
});
$("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const prompt=$("prompt").value.trim(), file=$("dataroom").files[0];
  const force=$("force").checked, budget=parseInt($("budget").value,10)||100000;
  const tools=[...document.querySelectorAll(".tool:checked")].map(c=>c.value).join(",");
  if(prompt.length<5){$("msg").textContent="prompt too short";return;}
  $("go").disabled=true;$("msg").textContent="queuing…";
  const fd=new FormData();fd.append("prompt",prompt);fd.append("budget",budget);fd.append("force_budget",force?"true":"false");fd.append("tools",tools);
  if(file)fd.append("dataroom",file);
  try{
    const r=await fetch("/jobs",{method:"POST",body:fd});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||"error");
    location.href=`/jobs/${d.job_id}/dashboard`;
  }catch(err){$("msg").textContent="failed: "+(err.message||err);$("go").disabled=false;}
});
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const A='viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"';
const ICON={
  md:`<svg ${A}><path d="M8 2.5v7"/><path d="M5 6.8l3 3 3-3"/><path d="M3.5 12.5h9"/></svg>`,
  trace:`<svg ${A}><path d="M3 3.5h10"/><path d="M3 8h10"/><path d="M3 12.5h6"/></svg>`,
};
function dot(s){if(s==="running")return '<span class="dot on blink"></span>';if(s==="done"||s==="stopped"||s==="failed")return '<span class="dot on"></span>';return '<span class="dot"></span>';}
function acts(j){
  const done=(j.status==="done"||j.status==="stopped");
  const dis=done?"":'aria-disabled="true"';
  return `<a class="icon" ${dis} title="download ANSWER.md" href="/jobs/${j.job_id}/answer/download" onclick="event.stopPropagation()">${ICON.md}</a>`+
         `<a class="icon" ${dis} title="download full LLM trace (HTML, incl. thinking)" href="/jobs/${j.job_id}/trace.html" onclick="event.stopPropagation()">${ICON.trace}</a>`;
}
async function loadJobs(){
  try{
    const r=await fetch("/jobs",{cache:"no-store"});const d=await r.json();
    const rows=(d.jobs||[]);
    $("jobs").innerHTML=rows.length?rows.map(j=>{
      const pct=j.percent!=null?` · ${j.percent}%`:"";
      return `<div class="job" onclick="location.href='/jobs/${j.job_id}/dashboard'">`+
        `<span class="st">${dot(j.status)}</span>`+
        `<span class="q" title="${esc(j.query)}">${esc(j.query)||"(no prompt)"}</span>`+
        `<span class="pg">${esc(j.status)}${pct}</span>`+
        `<span class="acts">${acts(j)}</span></div>`;
    }).join(""):'<div class="msg">none yet</div>';
  }catch(e){}
}
loadJobs();setInterval(loadJobs,4000);
</script>
</body>
</html>
